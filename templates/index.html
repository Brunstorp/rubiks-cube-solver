<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube Solver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <header>
        <h1>Rubik's Cube Solver</h1>
        <p class="subtitle">
            Drag to rotate the cube. Pick a colour, click stickers to paint.
            Centre stickers are locked.
        </p>
    </header>

    <main>
        <section class="cube-area">
            <div id="cube-container">
                <canvas id="cube-canvas"></canvas>
                <div id="face-labels"></div>
            </div>
            <div id="status-bar"></div>
        </section>

        <aside class="controls">
            <fieldset>
                <legend>Colour</legend>
                <div class="palette" id="palette">
                    <button class="swatch" data-color="U" style="background:#ffffff" title="U / White"></button>
                    <button class="swatch" data-color="D" style="background:#ffd400" title="D / Yellow"></button>
                    <button class="swatch" data-color="F" style="background:#1bb24b" title="F / Green"></button>
                    <button class="swatch" data-color="B" style="background:#1a4dd6" title="B / Blue"></button>
                    <button class="swatch" data-color="L" style="background:#ff7a00" title="L / Orange"></button>
                    <button class="swatch" data-color="R" style="background:#d80000" title="R / Red"></button>
                </div>
            </fieldset>

            <fieldset>
                <legend>Cube</legend>
                <div class="row">
                    <button id="btn-solved">Reset to solved</button>
                    <button id="btn-scramble">Random scramble</button>
                </div>
                <div class="row">
                    <button id="btn-capture">📷 Scan cube with camera</button>
                </div>
                <div class="row">
                    <button id="btn-solve" class="primary">Solve</button>
                </div>
            </fieldset>

            <fieldset id="solution-panel" class="hidden">
                <legend>Solution</legend>
                <div id="solution-summary"></div>
                <div id="moves-list"></div>
                <div class="row stepper">
                    <button id="btn-first" title="Reset to scrambled state">|&lt;</button>
                    <button id="btn-prev" title="Previous move">&lt;</button>
                    <button id="btn-play" title="Play / pause">▶</button>
                    <button id="btn-next" title="Next move">&gt;</button>
                    <button id="btn-last" title="Jump to solved state">&gt;|</button>
                </div>
                <div id="step-indicator"></div>
            </fieldset>
        </aside>
    </main>

    <div id="camera-modal" class="modal hidden">
        <div class="modal-content">
            <header>
                <h2 id="cam-title">Capture face</h2>
                <button id="cam-close" aria-label="Close">×</button>
            </header>
            <p id="cam-instruction">Position the cube in the centre of the frame.</p>
            <div class="cam-progress" id="cam-progress"></div>
            <div class="wizard-body">
                <div class="video-stage">
                    <video id="cam-video" autoplay playsinline muted></video>
                    <canvas id="cam-snap-canvas" class="hidden"></canvas>
                    <canvas id="cam-overlay-canvas"></canvas>
                    <div class="cam-overlay"><div class="cam-guide"></div></div>
                    <div class="cam-status" id="cam-status">Scanning…</div>
                </div>
                <div class="wizard-sidebar">
                    <p class="sidebar-label">This face</p>
                    <div id="mini-face" class="mini-face"></div>
                    <p class="sidebar-label">Paint colour</p>
                    <div id="mini-palette" class="mini-palette"></div>
                    <button id="cam-apply">Apply camera detection</button>
                </div>
            </div>
            <div id="cam-error" class="cam-error hidden"></div>
            <div class="wizard-footer">
                <button id="cam-prev">← Previous face</button>
                <button id="cam-next" class="primary">Next face →</button>
            </div>
            <p class="cam-fallback">
                No camera, or want to use existing photos?
                <label class="link" for="cam-file">Upload one for the current face</label>
                <input type="file" id="cam-file" accept="image/*" hidden>
            </p>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
